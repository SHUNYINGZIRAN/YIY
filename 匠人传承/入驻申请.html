        <script>
            // Toast
            const toast = document.getElementById('toastMsg');
            function showMessage(msg, isError = false) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // 通用文件上传处理
            function setupFileUpload(uploadAreaId, fileInputId, fileListId, maxFiles = 5, maxSizeMB = 5) {
                const uploadArea = document.getElementById(uploadAreaId);
                const fileInput = document.getElementById(fileInputId);
                const fileListDiv = document.getElementById(fileListId);
                let files = [];

                // 点击区域触发文件选择
                uploadArea.addEventListener('click', () => fileInput.click());
                // 拖拽上传
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#8c6d46';
                });
                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.style.borderColor = '#d6ccc2';
                });
                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#d6ccc2';
                    const droppedFiles = Array.from(e.dataTransfer.files);
                    addFiles(droppedFiles);
                });

                fileInput.addEventListener('change', (e) => {
                    addFiles(Array.from(e.target.files));
                    fileInput.value = ''; // 清空以便重复选择同一文件
                });

                function addFiles(newFiles) {
                    for (let file of newFiles) {
                        if (files.length >= maxFiles) {
                            showMessage(`最多上传 ${maxFiles} 个文件`, true);
                            break;
                        }
                        if (file.size > maxSizeMB * 1024 * 1024) {
                            showMessage(`${file.name} 超过 ${maxSizeMB}MB`, true);
                            continue;
                        }
                        files.push(file);
                    }
                    renderFileList();
                }

                function renderFileList() {
                    fileListDiv.innerHTML = '';
                    files.forEach((file, idx) => {
                        const tag = document.createElement('div');
                        tag.className = 'file-tag';
                        tag.innerHTML = `<i class="fas fa-file"></i> ${file.name} <i class="fas fa-times" data-index="${idx}"></i>`;
                        tag.querySelector('.fa-times').addEventListener('click', (e) => {
                            e.stopPropagation();
                            files.splice(idx, 1);
                            renderFileList();
                        });
                        fileListDiv.appendChild(tag);
                    });
                }

                return {
                    getFiles: () => files
                };
            }

            // 初始化上传模块
            const idUpload = setupFileUpload('idUploadArea', 'idFile', 'idFileList', 2, 5);
            const certUpload = setupFileUpload('certUploadArea', 'certFile', 'certFileList', 5, 10);
            const workUpload = setupFileUpload('workUploadArea', 'workFile', 'workFileList', 5, 20);

            // 表单提交
            const form = document.getElementById('applyForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // 获取字段值
                const fullname = document.getElementById('fullname').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const email = document.getElementById('email').value.trim();
                const idcard = document.getElementById('idcard').value.trim();
                const projectName = document.getElementById('projectName').value.trim();
                const category = document.getElementById('category').value;
                const level = document.getElementById('level').value;
                const bio = document.getElementById('bio').value.trim();

                // 简单验证必填项
                if (!fullname || !phone || !idcard || !projectName || !category || !bio) {
                    showMessage('请填写所有必填项', true);
                    return;
                }
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    showMessage('请输入正确的手机号码', true);
                    return;
                }
                if (idcard.length !== 18 && idcard.length !== 15) {
                    showMessage('请输入有效的身份证号码', true);
                    return;
                }
                const idFiles = idUpload.getFiles();
                if (idFiles.length === 0) {
                    showMessage('请上传身份证明文件', true);
                    return;
                }

                // 模拟提交（实际应使用 FormData 发送至后端）
                // 这里仅演示成功提示
                showMessage('申请已提交，审核通过后会以短信/邮件通知您登录账号', false);
                // 可选：重置表单或跳转
                setTimeout(() => {
                    // 可跳转至登录页或其他
                    // window.location.href = "登录页面.html";
                }, 2500);
            });

            // ---------- 导航栏功能 ----------
            function initNavSearch() {
                const searchBtn = document.getElementById('applySearchBtn');
                const searchInput = document.getElementById('applySearchInput');
                if (searchBtn && searchInput) {
                    const handleSearch = () => {
                        const kw = searchInput.value.trim();
                        if (kw) {
                            showMessage('🔍 搜索 "' + kw + '" ，相关非遗好物正在整理中', false);
                            searchInput.value = '';
                        } else {
                            showMessage('🔍 输入关键词，发现更多非遗创作', false);
                        }
                    };
                    searchBtn.addEventListener('click', handleSearch);
                    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
                }
            }

            function initCartIcon() {
                const cartIcon = document.getElementById('applyCartIcon');
                if (cartIcon) {
                    cartIcon.addEventListener('click', () => {
                        window.location.href = '../购物车.html';
                    });
                }
            }

            function initNavLinks() {
                const navLinks = document.querySelectorAll('.nav-links a');
                navLinks.forEach(link => {
                    const pageName = link.getAttribute('data-page');
                    if (pageName) {
                        link.addEventListener('click', (e) => {
                            if (link.getAttribute('href') === '#') {
                                e.preventDefault();
                            }
                        });
                    }
                });
            }

            function initNavbar() {
                initNavSearch();
                initCartIcon();
                initNavLinks();
            }

            // 初始化导航栏
            initNavbar();

            // 初始化登录按钮
            document.addEventListener('DOMContentLoaded', () => {
                initLoginBtn('applyLoginBtn', '../个人资料/个人中心.html', '../登录and注册/登录页面.html');
            });
        </script>
</body>

</html>
