<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>匠人登录 · 云间小阁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f8f4e9;
            color: #5c4c3e;
            background-image: radial-gradient(#d6ccc2 1px, transparent 1px), radial-gradient(#d6ccc2 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 244, 233, 0.82);
            z-index: -1;
            pointer-events: none;
        }

        /* 古风装饰 */
        .decoration-big {
            position: fixed;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 12rem;
            color: #d6ccc2;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        .decoration-left {
            bottom: 5%;
            left: -3%;
            transform: rotate(-8deg);
        }

        .decoration-right {
            top: 10%;
            right: -2%;
            transform: rotate(12deg);
        }

        @media (max-width: 768px) {
            .decoration-big {
                font-size: 6rem;
                opacity: 0.15;
            }

            .decoration-left {
                bottom: 2%;
                left: -8%;
            }

            .decoration-right {
                top: 5%;
                right: -5%;
            }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            margin: 20px;
            position: relative;
            z-index: 2;
        }

        .login-card {
            background: rgba(255, 253, 245, 0.96);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 20px 35px -12px rgba(92, 76, 62, 0.25);
            border: 1px solid #e7dfd3;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #8c6d46, #c4a77d, #8c6d46);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 3rem;
            color: #8c6d46;
            margin-bottom: 12px;
        }

        .title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2rem;
            color: #4a382a;
            letter-spacing: 3px;
        }

        .badge {
            background: #f4ede2;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8c6d46;
            margin-top: 12px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            color: #b8a68b;
            font-size: 1rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid #d6ccc2;
            border-radius: 48px;
            background: rgba(255, 255, 245, 0.9);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            color: #5c4c3e;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #8c6d46;
            box-shadow: 0 0 0 3px rgba(140, 109, 70, 0.15);
            background: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #8c6d46;
            border: none;
            border-radius: 48px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: #745b3a;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(92, 76, 62, 0.25);
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #5c4c3e;
            color: #fef5e6;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        @media (max-width: 500px) {
            .toast-msg {
                white-space: normal;
                width: 80%;
                text-align: center;
            }

            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="decoration-big decoration-left">匠</div>
    <div class="decoration-big decoration-right">心</div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon"><i class="fas fa-hands-helping"></i></div>
                <h1 class="title">云间小阁</h1>
                <div class="badge"><i class="fas fa-tools"></i> 后台登录</div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="form-control" placeholder="账号" autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="密码">
                    </div>
                </div>

                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> 登录</button>
            </form>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <script>
        // 仅用于演示的模拟账号（实际应调用后端接口）
        // 正式使用时替换为后端验证
        const VALID_ACCOUNTS = [
            { username: "111", password: "111" }
        ];

        const toast = document.getElementById('toastMsg');
        function showMessage(msg, isError = false) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showMessage('请输入账号和密码', true);
                return;
            }

            // 验证账号密码
            const valid = VALID_ACCOUNTS.some(acc => acc.username === username && acc.password === password);
            if (valid) {
                // 登录成功，存储状态
                sessionStorage.setItem('craftsmanAuth', JSON.stringify({
                    loggedIn: true,
                    username: username
                }));
                showMessage('登录成功，正在跳转...');
                setTimeout(() => {
                    // 跳转至后台管理首页（请根据实际路径修改）
                    window.location.href = "../后台/经营总览.html";
                }, 1000);
            } else {
                showMessage('账号或密码错误', true);
                passwordInput.value = '';
            }
        });

        // 页面淡入
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.4s ease';
        setTimeout(() => { document.body.style.opacity = '1'; }, 50);
    </script>
</body>

</html>
