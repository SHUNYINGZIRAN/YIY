<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>匠人登录 · 云间工坊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f8f4e9;
            color: #5c4c3e;
            background-image: radial-gradient(#d6ccc2 1px, transparent 1px), radial-gradient(#d6ccc2 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            position: relative;
            min-height: 100vh;
        }

        a,
        a * {
            color: inherit;
            text-decoration: none;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 244, 233, 0.85);
            z-index: -1;
            pointer-events: none;
        }

        /* 水墨装饰 - 极简两笔 */
        .decoration-big {
            position: fixed;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 12rem;
            color: #d6ccc2;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        .decoration-left {
            bottom: 5%;
            left: -3%;
            transform: rotate(-8deg);
        }

        .decoration-right {
            top: 10%;
            right: -2%;
            transform: rotate(12deg);
        }

        @media (max-width: 768px) {
            .decoration-big {
                font-size: 6rem;
                opacity: 0.15;
            }

            .decoration-left {
                bottom: 2%;
                left: -8%;
            }

            .decoration-right {
                top: 5%;
                right: -5%;
            }
        }

        .site-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 24px 40px;
            position: relative;
            z-index: 2;
        }

        /* ========= 导航栏 ========= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(255, 253, 245, 0.88);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 12px 28px;
            margin-bottom: 32px;
            box-shadow: 0 4px 12px rgba(92, 76, 62, 0.08);
            border: 1px solid #e7dfd3;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .logo {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.9rem;
            color: #5c4c3e;
            letter-spacing: 2px;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .logo span {
            font-size: 1.3rem;
            color: #8c6d46;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #5c4c3e;
            font-weight: 500;
            transition: 0.2s;
            font-size: 1rem;
            position: relative;
        }

        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: #8c6d46;
            transition: 0.2s;
        }

        .nav-links a:hover:after,
        .nav-links a.active:after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #8c6d46;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #5c4c3e;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .icon-btn:hover {
            color: #8c6d46;
            transform: translateY(-2px);
        }

        /* 购物车角标 */
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #8c6d46;
            color: white;
            font-size: 0.65rem;
            border-radius: 30px;
            padding: 0px 6px;
            min-width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 登录/注册按钮风格 */
        .btn-outline {
            border: 1px solid #8c6d46;
            background: transparent;
            padding: 5px 14px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.8rem;
            color: #5c4c3e;
            cursor: pointer;
            transition: 0.3s;
        }

        /* 搜索框容器 */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            border: 1px solid #8c6d46;
            border-radius: 30px;
            padding: 8px 14px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: #5c4c3e;
            background: rgba(255, 253, 245, 0.95);
            outline: none;
            width: 0;
            opacity: 0;
            transition: all 0.3s ease;
            position: absolute;
            right: 100%;
            margin-right: 10px;
            overflow: hidden;
        }

        .search-input::placeholder {
            color: #9b8a78;
        }

        /* 鼠标悬停时展开搜索框 */
        .search-container:hover .search-input {
            width: 160px;
            opacity: 1;
        }

        .search-input:focus {
            border-color: #c4a77d;
            box-shadow: 0 0 0 3px rgba(140, 109, 70, 0.1);
        }

        .btn-outline:hover {
            background: #8c6d46;
            color: #fff;
        }

        /* 响应式导航 */
        @media (max-width: 860px) {
            .navbar {
                flex-direction: column;
                gap: 16px;
                border-radius: 32px;
                padding: 18px 20px;
            }

            .nav-links {
                gap: 18px;
                justify-content: center;
            }

            .nav-icons {
                margin-top: 6px;
            }
        }

        @media (max-width: 760px) {
            .site-wrapper {
                padding: 0 20px;
            }
        }

        @media (max-width: 580px) {
            .site-wrapper {
                padding: 16px 16px 32px;
            }

            .nav-links {
                gap: 16px;
                font-size: 0.9rem;
            }
        }

        /* 页面头部 - 极简 */
        .page-header {
            text-align: center;
            margin: 90px 0 50px;
        }

        .page-header h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.2rem;
            color: #5c4c3e;
            letter-spacing: 4px;
            font-weight: normal;
        }

        .page-header p {
            color: #8c6d46;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* 登录卡片 - 极致留白、古韵线条 (匠人专属) */
        .login-card {
            max-width: 380px;
            margin: 20px auto 80px;
            background: transparent;
            padding: 0 0 30px;
            position: relative;
        }

        /* 仿古印章或朱文点题 - 匠人标记 */
        .login-card:before {
            content: "匠";
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 6rem;
            color: #e2d8cc;
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            opacity: 0.3;
            letter-spacing: 0;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #c4b49f;
            padding: 12px 0 8px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: #5c4c3e;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-bottom-color: #8c6d46;
        }

        .form-group input::placeholder {
            color: #bcab97;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .login-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #8c6d46;
            color: #8c6d46;
            padding: 10px 0;
            border-radius: 40px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
            letter-spacing: 2px;
        }

        .login-btn:hover {
            background: #8c6d46;
            color: white;
        }

        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: #8c6d46;
        }

        .register-link a {
            border-bottom: 1px dotted #c4b49f;
            margin-left: 4px;
        }

        .register-link a:hover {
            border-bottom-color: #8c6d46;
        }

        /* 简约提示 */
        .simple-tip {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #bcab97;
        }

        /* 页脚 */
        .footer {
            margin-top: 80px;
            border-top: 0.5px solid #e2d8cc;
            padding: 36px 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 28px;
        }

        .footer-col p {
            font-size: 0.75rem;
            color: #9b8a78;
            margin: 8px 0;
        }

        .footer-col .logo-mini {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: #5c4c3e;
        }

        .social-icons i {
            font-size: 1.2rem;
            margin-right: 16px;
            color: #9b8a78;
        }

        .footer-bottom {
            text-align: center;
            width: 100%;
            margin-top: 28px;
            font-size: 0.7rem;
            color: #b8a994;
        }

        .footer-col h4 {
            font-size: 0.85rem;
            color: #5c4c3e;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .footer-col a {
            display: block;
            color: #9b8a78;
            font-size: 0.75rem;
            margin: 6px 0;
        }

        /* Toast 消息提示 - 统一风格 */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #5c4c3e;
            color: #fef5e6;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        @media (max-width: 768px) {
            .footer {
                flex-direction: column;
                text-align: center;
            }

            .login-card {
                max-width: 320px;
                margin: 20px auto 60px;
            }

            .page-header {
                margin: 80px 0 40px;
            }
        }
    </style>
    <!-- 公共登录状态管理 -->
    <script src="../assets/js/common.js"></script>
</head>

<body>
    <div class="decoration-big decoration-left">工</div>
    <div class="decoration-big decoration-right">巧</div>
    <div class="site-wrapper">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo-area">
                <a href="../index.html" class="logo">云间小阁 <span>· 非遗雅集</span></a>
            </div>
            <div class="nav-links">
                <a href="../index.html">首页</a>
                <a href="../非遗集市.html">非遗集市</a>
                <a href="../匠心传承.html">匠心传承</a>
                <a href="../非遗学堂.html">非遗学堂</a>
                <a href="../社区.html">社区</a>
            </div>
            <div class="nav-icons">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="搜索非遗好物..." id="searchInput">
                    <button class="icon-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <button class="icon-btn" id="cartIconBtn">
                    <i class="fas fa-shopping-bag"></i>
                </button>
                <button class="btn-outline" id="loginBtnNav">登录 / 注册</button>
            </div>
        </nav>
        <div class="page-header">
            <h1>匠人·入境</h1>
            <p>云间工坊 · 守艺人之门</p>
        </div>
        <div class="login-card">
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <input type="text" id="username" placeholder="账号" autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="密码">
                </div>
                <button type="submit" class="login-btn">入 坊</button>
            </form>
            <div class="register-link">
                未成匠籍？<a href="../匠人传承/入驻申请.html">点此申请入驻</a>
            </div>
            <div class="simple-tip">演示匠人：craft@yunjian.com / 123456</div>
        </div>
        <footer class="footer">
            <div class="footer-col">
                <div class="logo-mini">云间小阁</div>
                <p>非遗垂直电商平台 | 让传统手艺走进当代生活</p>
                <div class="social-icons"><i class="fab fa-weixin"></i><i class="fab fa-weibo"></i><i
                        class="fab fa-xiaohongshu"></i></div>
            </div>
            <div class="footer-col">
                <h4>助 阁</h4>
                <a href="../页尾/购买指南.html">购买指南</a>
                <a href="../页尾/非遗鉴定.html">非遗鉴定</a>
                <a href="../页尾/售后服务.html">售后服务</a>
            </div>
            <div class="footer-col">
                <h4>阁 中</h4>
                <a href="../页尾/传承人合作.html">传承人合作</a>
                <a href="../页尾/非遗保护基金.html">非遗保护基金</a>
                <a href="../页尾/加入我们.html">加入我们</a>
            </div>
            <div class="footer-col">
                <h4>联 系</h4>
                <p><i class="fas fa-phone-alt"></i> 400 889 0662</p>
                <p><i class="fas fa-envelope"></i> yunjian@ich.com</p>
            </div>
            <div class="footer-bottom">© 2025 云间小阁 | 非遗美学 · 传承华夏</div>
        </footer>
    </div>

    <!-- 全局toast消息提示 -->
    <div id="toastMsg" class="toast-msg"></div>

    <script>
        // 初始化登录按钮
        document.addEventListener('DOMContentLoaded', () => {
            initLoginBtn('loginBtnNav', '个人中心.html', '../登录and注册/登录页面.html');
        });

        // Toast 消息提示函数
        function showMessage(msg) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1800);
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                showMessage('请填写匠人账号和密码');
                return;
            }
            // 模拟匠人登录（演示账号）
            if (username === '123456' && password === '123456') {
                showMessage('登录成功，欢迎回到工坊');
                // 在新窗口中打开匠人工作台
                setTimeout(() => {
                    window.open('../后台/经营总览.html', '_blank');
                }, 1200);
            } else {
                showMessage('账号或密码错误，请联系阁中侍者');
            }
        }
        // 购物车徽章（简单演示）
        document.addEventListener('DOMContentLoaded', () => {
            const badge = document.querySelector('.cart-badge');
            if (badge) {
                const cart = localStorage.getItem('yunji_cart');
                if (cart) {
                    const items = JSON.parse(cart);
                    const total = items.reduce((s, i) => s + i.quantity, 0);
                    if (total > 0) {
                        badge.innerText = total;
                        badge.style.display = 'flex';
                    }
                }
            }
            document.querySelectorAll('.icon-btn').forEach(btn => {
                if (btn.querySelector('.fa-shopping-bag')) {
                    btn.addEventListener('click', () => window.location.href = '../购物车.html');
                }
            });
        });
    </script>
</body>

</html>
